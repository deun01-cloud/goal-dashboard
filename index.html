<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목표 · 업무 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #efefed;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #b0b0b0;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
    --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --teal: #1D9E75; --teal-light: #E1F5EE;
    --coral: #D85A30; --coral-light: #FAECE7;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --green-light: #EAF3DE; --green-dark: #27500A;
    --amber-light: #FAEEDA; --amber-dark: #633806;
    --red-light: #FCEBEB; --red-dark: #791F1F;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .app { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 6px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); color: var(--text2); background: transparent; font-family: inherit; transition: all .15s; }
  .tab:hover { background: var(--bg2); }
  .tab.active { background: var(--text); color: #fff; border-color: transparent; }
  .page { display: none; } .page.active { display: block; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat-frac { font-size: 22px; font-weight: 600; display: flex; align-items: baseline; gap: 1px; }
  .done-n { color: var(--text); } .sep { font-size: 18px; color: var(--text3); margin: 0 1px; } .total-n { font-size: 16px; color: var(--text3); }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .purple .done-n{color:var(--purple);} .teal .done-n{color:var(--teal);} .coral .done-n{color:var(--coral);} .blue .done-n{color:var(--blue);}
  .prog-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .fill-purple{background:var(--purple);} .fill-teal{background:var(--teal);} .fill-coral{background:var(--coral);} .fill-blue{background:var(--blue);}
  .item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .cb { width: 18px; height: 18px; min-width: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; background: transparent; flex-shrink: 0; }
  .cb.done { background: var(--purple); border-color: var(--purple); }
  .cb.done::after { content:''; width:9px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px); display:block; }
  .item-text { flex: 1; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-text.struck { text-decoration: line-through; color: var(--text3); }
  .tag{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
  .tag-w{background:var(--blue-light);color:var(--blue-dark);}
  .tag-p{background:var(--green-light);color:var(--green-dark);}
  .tag-h{background:var(--purple-light);color:var(--purple-dark);}
  .tag-m{background:var(--coral-light);color:#712B13;}
  .tag-s{background:var(--amber-light);color:var(--amber-dark);}
  .pri-badge{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
  .pri-high{background:var(--red-light);color:var(--red-dark);}
  .pri-mid{background:var(--amber-light);color:var(--amber-dark);}
  .pri-low{background:var(--bg3);color:var(--text2);}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px;line-height:1;font-family:inherit;flex-shrink:0;}
  .del-btn:hover{color:#c0392b;}
  .add-row{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap;}
  .add-row input[type="text"]{flex:1;min-width:120px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;}
  .add-row input[type="text"]:focus{border-color:var(--purple);}
  .add-row select,.add-row input[type="date"]{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 8px;font-size:13px;color:var(--text);background:var(--bg);outline:none;cursor:pointer;font-family:inherit;}
  .btn{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:background .12s;}
  .btn:hover{background:var(--bg2);}
  .btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
  .btn-primary:hover{background:var(--purple-dark);}
  .goal-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
  .goal-item:last-child{border-bottom:none;}
  .goal-text{flex:1;font-size:14px;min-width:0;}
  .goal-text.struck{text-decoration:line-through;color:var(--text3);}
  .goal-pct{font-size:12px;color:var(--text2);min-width:34px;text-align:right;}
  input[type="range"]{width:65px;cursor:pointer;accent-color:var(--purple);flex-shrink:0;}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
  .q-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:8px;}
  .q-year{background:#FCEBEB;color:#791F1F;} .q1{background:var(--purple-light);color:var(--purple-dark);}
  .q2{background:var(--teal-light);color:#085041;} .q3{background:var(--coral-light);color:#712B13;} .q4{background:var(--blue-light);color:var(--blue-dark);}
  .month-sel,.week-sel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
  .msel-btn,.wsel-btn{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;font-family:inherit;}
  .msel-btn:hover,.wsel-btn:hover{background:var(--bg2);}
  .msel-btn.active,.wsel-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-title{font-size:16px;font-weight:600;}
  .cal-nav-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;font-family:inherit;}
  .cal-nav-btn:hover{background:var(--bg2);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .dow{background:var(--bg2);padding:6px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);}
  .dow.sun{color:#c0392b;} .dow.sat{color:var(--blue);}
  .dcell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 4px;min-height:64px;background:var(--bg);cursor:pointer;}
  .dcell:nth-child(7n){border-right:none;}
  .dcell:hover{background:var(--bg2);}
  .dn{font-size:11px;color:var(--text2);line-height:1;margin-bottom:3px;}
  .dn.sun{color:#c0392b;} .dn.sat{color:var(--blue);}
  .dcell.other .dn{color:var(--text3);}
  .dcell.today{background:var(--purple-light);}
  .dcell.today .dn{color:var(--purple-dark);font-weight:700;}
  .dcell.today:hover{background:#e0dff8;}
  .dev{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
  .dev-w{background:#B5D4F4;color:#0C447C;} .dev-m{background:#F5C4B3;color:#712B13;}
  .dev-h{background:#CECBF6;color:#3C3489;} .dev-p{background:#C0DD97;color:#27500A;} .dev-s{background:#FAC775;color:#633806;}
  .sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:14px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;}
  .sync-dot.syncing{background:#BA7517;animation:pulse .8s infinite;}
  .sync-dot.error{background:var(--coral);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .spinner-wrap{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:10px 0;}
  .spinner{width:16px;height:16px;border:2px solid var(--bg3);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px;">
    <h1>목표 · 업무 대시보드</h1>
  </div>
  <p class="subtitle">연간 · 분기 목표 및 일간 · 주간 · 월간 업무 — 노션 DB 연동 (어떤 기기에서도 유지)</p>
  <div class="sync-bar">
    <div class="sync-dot syncing" id="sync-dot"></div>
    <span id="sync-label">노션 연결 중...</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('dash',this)">대시보드</button>
    <button class="tab" onclick="goTab('goals',this)">목표 관리</button>
    <button class="tab" onclick="goTab('daily',this)">일간 업무</button>
    <button class="tab" onclick="goTab('weekly',this)">주간 업무</button>
    <button class="tab" onclick="goTab('monthly-cl',this)">월간 업무</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="page active">
    <div class="cal-header">
      <span class="cal-title" id="cal-title"></span>
      <div style="display:flex;gap:6px;">
        <button class="cal-nav-btn" onclick="calMove(-1)">&#8249;</button>
        <button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="main-cal"></div>
    <div class="stats-row" style="margin-top:14px;">
      <div class="stat"><div class="stat-frac teal" id="ds-year-frac"><span class="done-n">-</span><span class="sep">/</span><span class="total-n">-</span></div><div class="stat-label">연간 목표</div></div>
      <div class="stat"><div class="stat-frac blue" id="ds-q-frac"><span class="done-n">-</span><span class="sep">/</span><span class="total-n">-</span></div><div class="stat-label">분기 목표</div></div>
      <div class="stat"><div class="stat-frac coral" id="ds-done-d-frac"><span class="done-n">-</span><span class="sep">/</span><span class="total-n">-</span></div><div class="stat-label">오늘 완료</div></div>
      <div class="stat"><div class="stat-frac purple" id="ds-done-m-frac"><span class="done-n">-</span><span class="sep">/</span><span class="total-n">-</span></div><div class="stat-label">이번 달 완료</div></div>
    </div>
    <div class="card"><div class="card-title">오늘 업무 요약</div><div id="dash-today"></div></div>
    <div class="card"><div class="card-title">이번 주 업무</div><div id="dash-week"></div></div>
    <div class="card"><div class="card-title">이번 달 업무</div><div id="dash-month"></div></div>
    <div class="card"><div class="card-title">이번 분기 목표</div><div id="dash-q"></div></div>
    <div class="card"><div class="card-title">연간 목표 전체 완료율</div><div id="dash-year-prog"></div></div>
  </div>

  <!-- GOALS -->
  <div id="goals" class="page">
    <div class="card">
      <div class="card-title">목표 관리 (연간 · 분기)</div>
      <div id="goal-list"></div>
      <div class="add-row">
        <input type="text" id="g-new" placeholder="새 목표 입력..." onkeydown="if(event.key==='Enter')addGoal()">
        <select id="g-div"><option value="연간">연간</option><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option></select>
        <select id="g-cat"><option value="업무">업무</option><option value="개인">개인</option><option value="건강">건강</option><option value="재무">재무</option><option value="학습">학습</option></select>
        <button class="btn btn-primary" onclick="addGoal()">+ 추가</button>
      </div>
    </div>
  </div>

  <!-- DAILY -->
  <div id="daily" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <span class="section-title" style="margin-bottom:0;">일간 업무</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="date" id="daily-date-picker" style="border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;">
        <span style="font-size:13px;color:var(--purple);" id="daily-date-label"></span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-frac" id="dd-total"><span class="done-n">0</span></div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-frac teal" id="dd-done-frac"><span class="done-n">0</span><span class="sep">/</span><span class="total-n">0</span></div><div class="stat-label">완료</div></div>
      <div class="stat"><div class="stat-frac" id="dd-left"><span class="done-n">0</span></div><div class="stat-label">남음</div></div>
      <div class="stat"><div class="stat-frac purple" id="dd-pct"><span class="done-n">0%</span></div><div class="stat-label">달성률</div></div>
    </div>
    <div class="card">
      <div id="daily-list"></div>
      <div class="add-row" style="margin-top:10px;">
        <input type="text" id="daily-new" placeholder="새 업무 추가..." onkeydown="if(event.key==='Enter')addDailyTask()">
        <select id="daily-tag"><option value="업무">업무</option><option value="개인">개인</option><option value="건강">건강</option><option value="미팅">미팅</option><option value="학습">학습</option></select>
        <select id="daily-pri"><option value="높음">높음</option><option value="보통">보통</option><option value="낮음">낮음</option></select>
        <button class="btn btn-primary" onclick="addDailyTask()">추가</button>
      </div>
    </div>
  </div>

  <!-- WEEKLY -->
  <div id="weekly" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <span class="section-title" style="margin-bottom:0;">주간 업무</span>
      <span style="font-size:13px;color:var(--purple);" id="weekly-label"></span>
    </div>
    <div class="week-sel" id="week-sel-btns"></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-frac" id="wd-total"><span class="done-n">0</span></div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-frac teal" id="wd-done-frac"><span class="done-n">0</span><span class="sep">/</span><span class="total-n">0</span></div><div class="stat-label">완료</div></div>
      <div class="stat"><div class="stat-frac" id="wd-left"><span class="done-n">0</span></div><div class="stat-label">남음</div></div>
      <div class="stat"><div class="stat-frac purple" id="wd-pct"><span class="done-n">0%</span></div><div class="stat-label">달성률</div></div>
    </div>
    <div class="card">
      <div id="weekly-list"></div>
      <div class="add-row" style="margin-top:10px;">
        <input type="text" id="weekly-new" placeholder="새 주간 업무 추가..." onkeydown="if(event.key==='Enter')addWeeklyTask()">
        <select id="weekly-tag"><option value="업무">업무</option><option value="개인">개인</option><option value="건강">건강</option><option value="미팅">미팅</option><option value="학습">학습</option></select>
        <select id="weekly-pri"><option value="높음">높음</option><option value="보통">보통</option><option value="낮음">낮음</option></select>
        <button class="btn btn-primary" onclick="addWeeklyTask()">추가</button>
      </div>
    </div>
  </div>

  <!-- MONTHLY -->
  <div id="monthly-cl" class="page">
    <div style="margin-bottom:10px;"><span class="section-title" style="margin-bottom:0;">월간 업무</span></div>
    <div class="month-sel" id="mcl-month-sel"></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-frac" id="md-total"><span class="done-n">0</span></div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-frac teal" id="md-done-frac"><span class="done-n">0</span><span class="sep">/</span><span class="total-n">0</span></div><div class="stat-label">완료</div></div>
      <div class="stat"><div class="stat-frac" id="md-left"><span class="done-n">0</span></div><div class="stat-label">남음</div></div>
      <div class="stat"><div class="stat-frac purple" id="md-pct"><span class="done-n">0%</span></div><div class="stat-label">달성률</div></div>
    </div>
    <div class="card">
      <div id="monthly-list"></div>
      <div class="add-row" style="margin-top:10px;">
        <input type="text" id="mcl-new" placeholder="새 월간 업무 추가..." onkeydown="if(event.key==='Enter')addMonthlyTask()">
        <select id="mcl-tag"><option value="업무">업무</option><option value="개인">개인</option><option value="건강">건강</option><option value="미팅">미팅</option><option value="학습">학습</option></select>
        <select id="mcl-pri"><option value="높음">높음</option><option value="보통">보통</option><option value="낮음">낮음</option></select>
        <button class="btn btn-primary" onclick="addMonthlyTask()">추가</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — Notion API direct call via proxy
============================================================ */
var TOKEN = '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';
var NOTION_VER = '2022-06-28';
/* CORS 우회용 공개 프록시 */
var PROXY = 'https://notion-proxy.deun01.workers.dev';

var DB = {
  daily:   'e1221227-a12f-4370-9491-475d781f512a',
  weekly:  'b98bce55-0500-4134-bd73-633fbcbfb292',

var NOTION_BASE = 'https://api.notion.com/v1';

/* ============================================================
   NOTION API HELPERS
============================================================ */
async function nFetch(path, method, body) {
  /* Worker가 /databases/... 경로를 받아서 Notion API로 프록시 */
  var url = PROXY + path;
  var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(url, opts);
  if (!res.ok) {
    var err = await res.text();
    throw new Error(res.status + ': ' + err);
  }
  return res.json();
}

async function queryDB(dbId, filter) {
  var body = { page_size: 100 };
  if (filter) body.filter = filter;
  var data = await nFetch('/databases/' + dbId + '/query', 'POST', body);
  return data.results || [];
}

async function createPage(dbId, props) {
  var body = { parent: { database_id: dbId }, properties: props };
  var data = await nFetch('/pages', 'POST', body);
  return data.id;
}

/* ============================================================
   PROPERTY BUILDERS
============================================================ */
function pTitle(v) { return { title: [{ text: { content: v } }] }; }
function pCheck(v) { return { checkbox: v }; }
function pSelect(v) { return { select: { name: v } }; }
function pNumber(v) { return { number: v }; }
function pDate(v) { return { date: { start: v } }; }
function pText(v) { return { rich_text: [{ text: { content: v } }] }; }

/* PROPERTY READERS */
function rTitle(p, key) {
  var t = p[key];
  if (!t) return '';
  if (t.title) return (t.title[0] && t.title[0].plain_text) || '';
  return '';
}
function rCheck(p, key) { return !!(p[key] && p[key].checkbox); }
function rSelect(p, key) { return (p[key] && p[key].select && p[key].select.name) || ''; }
function rNumber(p, key) { return (p[key] && p[key].number) || 0; }
function rDate(p, key) { return (p[key] && p[key].date && p[key].date.start) || ''; }
function rText(p, key) {
  var t = p[key];
  if (!t || !t.rich_text) return '';
  return (t.rich_text[0] && t.rich_text[0].plain_text) || '';
}

/* ============================================================
   HELPERS
============================================================ */
var TODAY = new Date();
var calY = TODAY.getFullYear(), calM = TODAY.getMonth();
var MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function pad(n) { return String(n).padStart(2, '0'); }
function fmt(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr() { return fmt(TODAY); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function tagCls(t) { return 'tag tag-'+(t==='업무'?'w':t==='개인'?'p':t==='건강'?'h':t==='미팅'?'m':'s'); }
function priCls(p) { return 'pri-badge pri-'+(p==='높음'?'high':p==='보통'?'mid':'low'); }
function devCls(t) { return t==='업무'?'dev-w':t==='미팅'?'dev-m':t==='건강'?'dev-h':t==='학습'?'dev-s':'dev-p'; }
function priSort(a,b) {
  if (a.done !== b.done) return a.done ? 1 : -1;
  var po = {'높음':0,'보통':1,'낮음':2};
  return (po[a.pri]||1) - (po[b.pri]||1);
}
function setFrac(id, done, total) {
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML = '<span class="done-n">'+done+'</span><span class="sep">/</span><span class="total-n">'+total+'</span>';
}
function setSync(state, msg) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  lbl.textContent = msg;
}
function getWeekNum(dateStr) {
  var d = new Date(dateStr+'T00:00:00');
  var first = new Date(d.getFullYear(), d.getMonth(), 1);
  return Math.ceil((d.getDate() + first.getDay()) / 7);
}
function getYM(dateStr) {
  var d = new Date(dateStr+'T00:00:00');
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월';
}

/* ============================================================
   CACHE
============================================================ */
var cache = { daily:{}, weekly:{}, monthly:{}, goals:[] };
var selDailyDate = todayStr();
var selMonthly = TODAY.getMonth();
var _weekKeyList = [];
var selWeekKey = getYM(todayStr())+' '+getWeekNum(todayStr())+'주';

/* ============================================================
   LOAD ALL
============================================================ */
async function loadAll() {
  setSync('syncing', '노션에서 데이터 불러오는 중...');
  try {
    var [dailyR, weeklyR, monthlyR, goalsR] = await Promise.all([
      queryDB(DB.daily),
      queryDB(DB.weekly),
      queryDB(DB.monthly),
      queryDB(DB.goals)
    ]);

    /* daily */
    cache.daily = {};
    dailyR.forEach(function(p) {
      var pr = p.properties;
      var ds = rDate(pr, '날짜');
      if (!ds) return;
      if (!cache.daily[ds]) cache.daily[ds] = [];
      cache.daily[ds].push({
        id: p.id,
        text: rTitle(pr, '업무'),
        done: rCheck(pr, '완료'),
        tag: rSelect(pr, '태그') || '업무',
        pri: rSelect(pr, '우선순위') || '보통'
      });
    });

    /* weekly */
    cache.weekly = {};
    weeklyR.forEach(function(p) {
      var pr = p.properties;
      var ym = rText(pr, '연월');
      var wk = rSelect(pr, '주차');
      if (!ym || !wk) return;
      var key = ym + ' ' + wk;
      if (!cache.weekly[key]) cache.weekly[key] = [];
      cache.weekly[key].push({
        id: p.id,
        text: rTitle(pr, '업무'),
        done: rCheck(pr, '완료'),
        tag: rSelect(pr, '태그') || '업무',
        pri: rSelect(pr, '우선순위') || '보통'
      });
    });

    /* monthly */
    cache.monthly = {};
    monthlyR.forEach(function(p) {
      var pr = p.properties;
      var m = rSelect(pr, '월');
      var idx = MONTHS.indexOf(m);
      if (idx < 0) return;
      if (!cache.monthly[idx]) cache.monthly[idx] = [];
      cache.monthly[idx].push({
        id: p.id,
        text: rTitle(pr, '업무'),
        done: rCheck(pr, '완료'),
        tag: rSelect(pr, '태그') || '업무',
        pri: rSelect(pr, '우선순위') || '보통'
      });
    });

    /* goals */
    cache.goals = goalsR.map(function(p) {
      var pr = p.properties;
      return {
        id: p.id,
        text: rTitle(pr, '목표'),
        done: rCheck(pr, '완료'),
        prog: rNumber(pr, '진행률'),
        div: rSelect(pr, '구분') || '연간',
        cat: rSelect(pr, '카테고리') || '업무'
      };
    });

    setSync('ok', '노션 연동 완료 ✓  (마지막 동기화: ' + new Date().toLocaleTimeString() + ')');
    renderAll();
  } catch(e) {
    setSync('error', '연동 오류: ' + e.message);
    console.error(e);
  }
}

/* --- CALENDAR --- */
function renderCal() {
  var DOWS = ['일','월','화','수','목','금','토'];
  var h = DOWS.map(function(d,i){return '<div class="dow'+(i===0?' sun':i===6?' sat':'')+'">' +d+'</div>';}).join('');
  var first = new Date(calY,calM,1).getDay();
  var dim = new Date(calY,calM+1,0).getDate();
  var prev = new Date(calY,calM,0).getDate();
  var cells = [];
  for(var i=0;i<first;i++) cells.push({d:prev-first+1+i,cur:false});
  for(var i=1;i<=dim;i++) cells.push({d:i,cur:true});
  while(cells.length<42) cells.push({d:cells.length-first-dim+1,cur:false});
  cells.forEach(function(c,idx){
    var dow=idx%7;
    var isToday=c.cur&&calY===TODAY.getFullYear()&&calM===TODAY.getMonth()&&c.d===TODAY.getDate();
    var ds=c.cur?(calY+'-'+pad(calM+1)+'-'+pad(c.d)):'';
    var evs=ds&&cache.daily[ds]?cache.daily[ds]:[];
    var sunsat=dow===0?'sun':dow===6?'sat':'';
    var evH=evs.slice(0,3).map(function(t){return '<span class="dev '+devCls(t.tag)+'">'+(t.done?'✓ ':'')+escHtml(t.text)+'</span>';}).join('');
    if(evs.length>3) evH+='<span class="dev" style="color:var(--text3);">+'+(evs.length-3)+'개</span>';
    h+='<div class="dcell'+(c.cur?'':' other')+(isToday?' today':'')+'" onclick="'+(c.cur?'calClick(\''+ds+'\')':'')+'">'
      +'<div class="dn'+(sunsat&&c.cur?' '+sunsat:'')+'">'+c.d+'</div>'+evH+'</div>';
  });
  document.getElementById('main-cal').innerHTML=h;
  document.getElementById('cal-title').textContent=calY+'년 '+(calM+1)+'월';
}
function calClick(ds){selDailyDate=ds;goTab('daily',document.querySelectorAll('.tab')[2]);document.getElementById('daily-date-picker').value=ds;renderDailyTasks();}
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

  document.getElementById('md-left').innerHTML='<span class="done-n">'+(tasks.length-done)+'</span>';
  document.getElementById('md-pct').innerHTML='<span class="done-n">'+(tasks.length?Math.round(done/tasks.length*100):0)+'%</span>';
  var html=tasks.length===0?'<div style="color:var(--text3);font-size:13px;padding:8px 0;">이 달의 업무를 추가해보세요</div>':'';
  tasks.forEach(function(t,i){
    html+='<div class="item-row">'
      +'<div class="cb'+(t.done?' done':'')+'" onclick="toggleMonthlyByIdx('+i+')"></div>'
      +'<span class="item-text'+(t.done?' struck':'')+'">'+escHtml(t.text)+'</span>'
      +'<span class="'+tagCls(t.tag)+'">'+t.tag+'</span>'
      +'<span class="'+priCls(t.pri)+'">'+t.pri+'</span>'
      +'<button class="del-btn" onclick="delMonthlyByIdx('+i+')">&#10005;</button></div>';
  });
  document.getElementById('monthly-list').innerHTML=html;
}
function selMonth(i){selMonthly=i;renderMonthlyTasks();}

============================================================ */
async function withSync(fn) {
  setSync('syncing','저장 중...');
  try {
    await fn();
    setSync('ok','저장됨 ✓  '+new Date().toLocaleTimeString());
  } catch(e) {
    setSync('error','저장 실패: '+e.message);
  }
}

/* GOALS */
async function addGoal(){
  var v=document.getElementById('g-new').value.trim();if(!v)return;
  var div=document.getElementById('g-div').value,cat=document.getElementById('g-cat').value;
  var optimistic={id:'temp-'+Date.now(),text:v,done:false,prog:0,div:div,cat:cat};
  cache.goals.push(optimistic);
  document.getElementById('g-new').value='';
  renderGoals();renderDashboard();
  await withSync(async function(){
    var id=await createPage(DB.goals,{'목표':pTitle(v),'구분':pSelect(div),'카테고리':pSelect(cat),'진행률':pNumber(0),'완료':pCheck(false)});
    optimistic.id=id;
  });
}
function toggleGoal(idx){
  var g=cache.goals[idx];if(!g)return;
  g.done=!g.done;renderGoals();renderDashboard();
  withSync(function(){return updatePage(g.id,{'완료':pCheck(g.done)});});
}
function updProg(idx,v){
  var g=cache.goals[idx];if(!g)return;
  g.prog=parseInt(v);renderGoals();renderDashboard();
  withSync(function(){return updatePage(g.id,{'진행률':pNumber(g.prog)});});
}
function delGoal(idx){
  var g=cache.goals[idx];if(!g)return;
  cache.goals.splice(idx,1);renderGoals();renderDashboard();
  withSync(function(){return deletePage(g.id);});
}
